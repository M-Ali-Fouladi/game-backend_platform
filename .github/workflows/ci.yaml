name: Build and Push Game Backend Services

on:
 push:
  branches:
    - main

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - player-service
          - matchmaking-service
          - leaderboard-service
          - telemetry-service
          - websocket-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/m-ali-fouladi/${{ matrix.service }}:${{ github.sha }} \
            -f services/${{ matrix.service }}/Dockerfile \
            services/${{ matrix.service }}

      - name: Push Docker image
        run: |
          docker push ghcr.io/m-ali-fouladi/${{ matrix.service }}:${{ github.sha }}

  update-gitops:
    needs: docker
    runs-on: ubuntu-latest


    steps:
      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: M-Ali-Fouladi/game-backend_platform
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: List repository
        run: |
          ls -R

      - name: Update image tags
        run: |
          SERVICES=(
            player-service
            matchmaking-service
            leaderboard-service
            telemetry-service
            websocket-service
          )

          for SERVICE in "${SERVICES[@]}"
          do
            sed -i "s|image: .*|image: ghcr.io/${{ github.repository_owner }}/${SERVICE}:${{ github.sha }}|g" \
            gitops/infra/k8s/${SERVICE}.yaml
          done

      - name: Commit and Push changes
        run: |
          cd gitops

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update game backend images to ${{ github.sha }}" || exit 0
          git pull --rebase origin main
          git push origin main

