apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaderboard-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: leaderboard-service

  template:
    metadata:
      labels:
        app: leaderboard-service

    spec:
      containers:
        - name: leaderboard-service
          image: ghcr.io/M-Ali-Fouladi/leaderboard-service:bf8841564e0c0f285784b78d8fc6fbf17e65781d
          imagePullPolicy: Always

          ports:
            - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: leaderboard-service

spec:
  selector:
    app: leaderboard-service

  ports:
    - port: 80
      targetPort: 8000

  type: ClusterIP