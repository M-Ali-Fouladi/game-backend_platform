apiVersion: apps/v1
kind: Deployment
metadata:
  name: player-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: player-service

  template:
    metadata:
      labels:
        app: player-service

    spec:
      containers:
        - name: player-service
          image: ghcr.io/M-Ali-Fouladi/player-service:7be65151e96975f8e4cb1314a2c1067fd5a0d56e
          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          env:
            - name: DATABASE_URL
              value: "postgresql://game:gamepass@postgres:5432/game_db"

            - name: REDIS_URL
              value: "redis://redis:6379"

---
apiVersion: v1
kind: Service
metadata:
  name: player-service

spec:
  selector:
    app: player-service

  ports:
    - port: 80
      targetPort: 8000

  type: ClusterIP