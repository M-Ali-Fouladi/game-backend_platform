apiVersion: apps/v1
kind: Deployment
metadata:
  name: matchmaking-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: matchmaking-service

  template:
    metadata:
      labels:
        app: matchmaking-service

    spec:
      containers:
        - name: matchmaking-service
          image: ghcr.io/M-Ali-Fouladi/matchmaking-service:bec9f716854ed6c893b28d5a1cda1d573b6b1664
          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          env:
          
            - name: REDIS_URL
              value: "redis://redis:6379"

---
apiVersion: v1
kind: Service
metadata:
  name: matchmaking-service

spec:
  selector:
    app: matchmaking-service

  ports:
    - port: 80
      targetPort: 8000

  type: ClusterIP