apiVersion: apps/v1
kind: Deployment
metadata:
  name: matchmaking-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: matchmaking-service

  template:
    metadata:
      labels:
        app: matchmaking-service

    spec:
      containers:
        - name: matchmaking-service
          image: ghcr.io/M-Ali-Fouladi/matchmaking-service:3b2aa46d2d8cfa0d2b710efb939b1c23cb04b49d
          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          env:
          
            - name: REDIS_URL
              value: "redis://redis:6379"

---
apiVersion: v1
kind: Service
metadata:
  name: matchmaking-service

spec:
  selector:
    app: matchmaking-service

  ports:
    - port: 80
      targetPort: 8000

  type: ClusterIP