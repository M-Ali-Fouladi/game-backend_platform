apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: websocket-service

  template:
    metadata:
      labels:
        app: websocket-service

    spec:
      containers:
        - name: websocket-service
          image: ghcr.io/M-Ali-Fouladi/websocket-service:e0957d160e1cfb15f8d7d3a7a1d0694abc1dd5d5
          imagePullPolicy: Always

          ports:
            - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: websocket-service

spec:
  selector:
    app: websocket-service

  ports:
    - port: 80
      targetPort: 8000

  type: ClusterIP