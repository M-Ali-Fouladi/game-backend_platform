apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: websocket-service

  template:
    metadata:
      labels:
        app: websocket-service

    spec:
      containers:
        - name: websocket-service
          image: ghcr.io/M-Ali-Fouladi/websocket-service:b8e89cc217e699b5f518e32a6fef85bf4224a615
          imagePullPolicy: Always

          ports:
            - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: websocket-service

spec:
  selector:
    app: websocket-service

  ports:
    - port: 80
      targetPort: 8000

  type: ClusterIP